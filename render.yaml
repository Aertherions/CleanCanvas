services:
  - type: web
    name: clean-creation-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn personal_site.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DEBUG
        value: "false"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_HOST
        sync: false
      - key: DATABASE_PORT
        value: "4000"
      - key: DATABASE_USER
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: DATABASE_NAME
        sync: false
      - key: DATABASE_SSL
        value: "true"
      - key: CREDIT_RATE
        value: "10"
      - key: MAX_UPLOAD_MB
        value: "5"
      - key: ENABLE_FFMPEG
        value: "false"
